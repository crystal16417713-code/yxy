<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; color: #00ff41; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'PingFang SC', 'STHeiti', sans-serif; overflow: hidden; }
        .label { color: #1a1a1a; font-size: 10px; letter-spacing: 6px; margin-bottom: 10px; }
        .marker-text { color: #008f11; font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 5px; }
        #num { font-size: 120px; font-weight: bold; text-shadow: 0 0 20px #00ff41; margin: 0; line-height: 1; }
        .desc { color: #008f11; font-size: 1rem; margin-top: 30px; letter-spacing: 4px; text-align: center; line-height: 2; font-weight: 300; }
        .action-area { margin-top: 60px; text-align: center; }
        .copy-btn { padding: 12px 45px; border: 1px solid #00ff41; color: #00ff41; background: transparent; cursor: pointer; font-size: 14px; letter-spacing: 4px; border-radius: 0; transition: all 0.3s; }
        .copy-btn:active { background: #00ff41; color: #000; }
    </style>
</head>
<body>
    <div class="label">SYSTEM SYNCHRONIZATION</div>
    <div class="marker-text">当前时空标记</div>
    <div id="num">--</div>
    <div class="desc">万物皆有定序<br>此间同频</div>
    <div class="action-area">
        <button class="copy-btn" onclick="copyNum()">提取并解锁</button>
    </div>
    <script>
        const today = new Date().toLocaleDateString('zh-CN');
        let storageData = localStorage.getItem('ts_marker_daily_v7');
        let finalNum;
        if (storageData) {
            const data = JSON.parse(storageData);
            if (data.date === today) { finalNum = data.num; }
        }
        if (!finalNum) {
            finalNum = Math.floor(Math.random() * 64) + 1;
            localStorage.setItem('ts_marker_daily_v7', JSON.stringify({ date: today, num: finalNum }));
        }
        document.getElementById('num').innerText = finalNum;
        function copyNum() {
            const numText = document.getElementById('num').innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(numText).then(() => {
                    alert("【标记 " + numText + " 已提取】\n\n请返回对话框发送\n解锁万象。");
                });
            } else { alert("请手动复制当前标记：" + numText); }
        }
    </script>
</body>
</html>
